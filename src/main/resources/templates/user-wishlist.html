<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${username} + 's ' + ${wishlist.name} + ' ønskeliste'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .wish-card {
            border-radius: 12px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .wish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" th:href="@{/wishlist/{username}(username=${username})}">🎁 Wishlist</a>
    <div class="ms-auto d-flex align-items-center gap-3">

        <div th:if="${user != null}" class="d-flex align-items-center gap-3">
            <span class="text-white" th:text="'Hej, ' + ${user.username} + '!'"></span>
            <a th:href="@{/wishlist/profile}" class="btn btn-outline-light btn-sm">👤 Profil</a>
            <a th:href="@{/wishlist/logout}" class="btn btn-outline-light btn-sm">Log ud</a>
        </div>

        <div th:if="${user == null}" class="d-flex align-items-center gap-2">
            <a th:href="@{/wishlist/login}" class="btn btn-outline-light btn-sm">Log ind</a>
            <a th:href="@{/wishlist/register}" class="btn btn-light btn-sm">Opret bruger</a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <!-- Header row -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0" th:text="${wishlist.name}"></h2>
        <div th:if="${isOwner}" class="d-flex gap-2">
            <a th:href="@{/wishlist/{username}/{name}/edit(username=${username}, name=${wishlist.name})}"
               class="btn btn-outline-secondary btn-sm">✏️ Rediger</a>
            <form th:action="@{/wishlist/delete}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${wishlist.id}">
                <input type="hidden" name="userId" th:value="${wishlist.userId}">
                <button type="submit" class="btn btn-outline-danger btn-sm">🗑 Slet</button>
            </form>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(wishlist.wishes)}" class="text-center py-5">
        <p class="text-muted fs-5">Ingen ønsker endnu.</p>
    </div>

    <!-- Wish cards -->
    <div class="row g-4" th:if="${not #lists.isEmpty(wishlist.wishes)}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="wish : ${wishlist.wishes}">
            <div class="card wish-card h-100 p-3 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-semibold" th:text="${wish.name}"></h5>
                    <p class="text-muted mb-1" th:text="${wish.price} + ' DKK'"></p>
                    <a th:href="${wish.link.startsWith('http') ? wish.link : 'https://' + wish.link}"
                       target="_blank"
                       class="btn btn-outline-dark btn-sm mt-auto">🔗 Se produkt</a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
