<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mine Ønskelister</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .wishlist-card {
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border-radius: 16px;
        }
        .wishlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .card-icon {
            font-size: 2.5rem;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <span class="navbar-brand">🎁 Wishlist</span>
    <div class="ms-auto d-flex align-items-center gap-3">
        <a href="/wishlist/logout" class="btn btn-outline-light btn-sm">Log ud</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- Header row -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0" th:text="${username} + 's ønskelister'"></h2>
        <a th:if="${isOwner}" th:href="@{/wishlist/add}" class="btn btn-dark">
            ➕ Tilføj ønskeliste
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(wishlists)}" class="text-center py-5">
        <div th:if="${isOwner}">
            <p class="text-muted fs-5">Du har ingen ønskelister endnu.</p>
            <a th:href="@{/wishlist/add}" class="btn btn-dark mt-2">Opret din første ønskeliste</a>
        </div>
        <div th:unless="${isOwner}">
            <p class="text-muted fs-5"
               th:text="${username} + ' har ingen ønskelister endnu.'"></p>
        </div>
    </div>

    <!-- Wishlist cards -->
    <div class="row g-4" th:if="${not #lists.isEmpty(wishlists)}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="wishlist : ${wishlists}">
            <a th:href="@{/wishlist/{username}/{name}(username=${username}, name=${wishlist.name})}">
                <div class="card wishlist-card h-100 p-3 text-center shadow-sm">
                    <div class="card-body">
                        <div class="card-icon mb-3">🎁</div>
                        <h5 class="card-title fw-semibold" th:text="${wishlist.name}"></h5>
                        <p class="text-muted small"
                           th:text="${#lists.size(wishlist.wishes)} + ' ønsker'"></p>
                    </div>
                </div>
            </a>
        </div>
    </div>

</div>

</body>
</html>
