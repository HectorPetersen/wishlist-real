<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Rediger ønskeliste' : 'Tilføj ønskeliste'"></title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <span class="navbar-brand">🎁 Wishlist</span>
    <div class="ms-auto d-flex align-items-center gap-3">

        <div th:if="${user != null}" class="d-flex align-items-center gap-3">
            <span class="text-white"
                  th:text="'Hej, ' + ${user.username} + '!'"></span>
            <a th:href="@{/wishlist/logout}" class="btn btn-outline-light btn-sm">Log ud</a></div>

        <div th:if="${user == null}" class="d-flex align-items-center gap-2">
            <a th:href="@{/wishlist/login}" class="btn btn-outline-light btn-sm">Log ind</a>
            <a th:href="@{/wishlist/register}" class="btn btn-light btn-sm">Opret bruger</a>
        </div>

    </div>
</nav>

<div class="container mt-5" th:object="${wishlist}">
    <h1 class="text-center mb-4"
        th:text="${isEdit} ? 'Rediger ønskeliste' : 'Tilføj ønskeliste'"></h1>

    <form th:action="${isEdit} ? '/wishlist/update' : '/wishlist/save'" method="post">
        <!-- Navn på liste -->
        <div class="mb-4">
            <label class="form-label">Navn på ønskeliste</label>
            <input type="text" th:field="*{name}" class="form-control" required></div>

        <!-- Wishes container -->
        <div id="wishes-container">

            <!-- En wish -->
            <div class="card mb-3 p-3" th:each="wish, iterStat : *{wishes}">
                <div class="row align-items-end">

                    <div class="col-md-4">
                        <label>Navn</label>
                        <input type="text"
                               th:name="'wishes[' + ${iterStat.index} + '].name'"
                               th:value="${wish.name}"
                               class="form-control"
                               placeholder="Produkt navn"
                               required>
                    </div>

                    <div class="col-md-3">
                        <label>Link</label>
                        <input type="text"
                               th:name="'wishes[' + ${iterStat.index} + '].link'"
                               th:value="${wish.link}"
                               class="form-control"
                               placeholder="https://...">
                    </div>

                    <div class="col-md-3">
                        <label>Pris</label>
                        <input type="number"
                               th:name="'wishes[' + ${iterStat.index} + '].price'"
                               th:value="${wish.price}"
                               class="form-control"
                               placeholder="DKK"
                               min="0"
                               max="99999.99">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" onclick="removeWish(this)"
                                class="btn btn-outline-danger w-100">Fjern
                        </button>
                    </div>

                </div>
            </div>

        </div>

        <!-- Add button -->
        <button type="button" onclick="addWish()" class="btn btn-outline-secondary mb-3">
            ➕ Tilføj ønske
        </button>

        <br>

        <button type="submit" class="btn btn-outline-primary"
                th:text="${isEdit} ? 'Opdater' : 'Gem'"></button>
    </form>
</div>

<script>
    function addWish() {
        const container = document.getElementById('wishes-container');
        const lastCard = container.lastElementChild;
        if (lastCard) {
            const nameInput = lastCard.querySelector('input[type="text"]');
            if (!nameInput.value.trim()) {
                nameInput.reportValidity();
                return;
            }
        }

        const index = container.children.length;

        const card = document.createElement('div');
        card.className = "card mb-3 p-3";

        card.innerHTML = `
            <div class="row align-items-end">
                <div class="col-md-4">
                    <label>Navn</label>
                    <input type="text" name="wishes[${index}].name" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label>Link</label>
                    <input type="text" name="wishes[${index}].link" class="form-control">
                </div>
                <div class="col-md-3">
                    <label>Pris</label>
                    <input type="number" name="wishes[${index}].price" class="form-control" min="0" max="99999.99">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="button" onclick="removeWish(this)" class="btn btn-outline-danger w-100">Fjern</button>
                </div>
            </div>
        `;

        container.appendChild(card);
    }

    function removeWish(btn) {
        btn.closest('.card').remove();
        document.querySelectorAll('#wishes-container .card').forEach((card, i) => {
            card.querySelectorAll('input').forEach(input => {
                input.name = input.name.replace(/\[\d+\]/, `[${i}]`);
            });
        });
    }
</script>

</body>
</html>
